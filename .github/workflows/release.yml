# NOTE: Inert while this package lives inside the pi-ui monorepo. GitHub Actions
# only discovers workflows from <repo-root>/.github/workflows/. This file activates
# when packages/ai-ui is split into its own repo and lands at the repo root.
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Publish uses a classic npm access token (NPM_TOKEN secret). Provenance/OIDC
    # trusted publishing is NOT enabled, so id-token:write is intentionally absent.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fail fast if publish secret is missing
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or missing. Add it under Settings → Secrets and variables → Actions before merging a Version Packages PR, or publish will fail with a confusing E403."
            exit 1
          fi

      - name: Checkout
        # v4 — actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Bun
        # v2 — oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build (bundle + .d.ts shipped in the tarball)
        run: bun run build

      - name: Create Release Pull Request or Publish
        # v1.9.0 — changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0
        with:
          publish: bun run release
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
