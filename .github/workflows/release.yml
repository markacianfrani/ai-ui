name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # OIDC trusted publishing: npm mints a short-lived publish token via GitHub
    # Actions OIDC at publish time. No NPM_TOKEN secret is stored. Requires the
    # npm account to have GitHub linked (already done for mark.cianfrani) and
    # id-token:write here, plus publishConfig.provenance in package.json.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        # v4 — actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Bun
        # v2 — oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup npm (OIDC trusted publishing)
        # Configures ~/.npmrc with registry + scope so `changeset publish`
        # authenticates via the OIDC-minted token, not a stored secret.
        # v4.4.0 — actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          registry-url: "https://registry.npmjs.org"
          scope: "@cianfrani"
          # OIDC trusted publishing requires npm 11.5+; Node 24 bundles a compatible npm.
          node-version: "24"

      - name: Upgrade npm (OIDC trusted-publish compatibility)
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build (bundle + .d.ts shipped in the tarball)
        run: bun run build

      - name: Create Release Pull Request or Publish
        # v1.9.0 — changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0
        with:
          publish: bun run release
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
